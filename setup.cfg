[flake8]
exclude = .venv,.git,.tox,docs,venv,bin,lib,deps,build
doctests = True
# Allineato alla tua preferenza di 120 (o 88 se preferisci lo standard Black)
max-line-length = 120
ignore =
    E501,
    W503,
    E203,
    D202,
    W504

[isort]
# Configurazione per l'ordinamento degli import
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
line_length = 120
indent = "    "
not_skip = __init__.py
force_sort_within_sections = true
sections = FUTURE,STDLIB,INBETWEENS,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
default_section = THIRDPARTY
# Aggiornato al nuovo dominio ble_radar
known_first_party = custom_components.ble_radar, tests
combine_as_imports = true

[tool:pytest]
# Aggiornato per calcolare la copertura sul nuovo percorso
addopts = -qq --cov=custom_components.ble_radar
console_output_style = count

[coverage:run]
branch = False

[coverage:report]
show_missing = true
# Nota: il 100% è ambizioso ma ottimo per un Radar preciso!
fail_under = 100
